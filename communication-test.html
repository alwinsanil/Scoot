<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAL Scooter - Two-Way Communication</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .section { 
            background: #f9f9f9; 
            padding: 20px; 
            margin: 20px 0; 
            border-radius: 8px; 
            border-left: 5px solid #667eea;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        button { 
            background: linear-gradient(45deg, #667eea, #764ba2); 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s ease;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .status { margin-top: 15px; padding: 12px; border-radius: 6px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .messages { 
            max-height: 400px; 
            overflow-y: auto; 
            background: white; 
            padding: 15px; 
            border: 2px solid #e9ecef; 
            border-radius: 6px;
            margin-top: 10px;
        }
        .message { 
            padding: 12px; 
            margin-bottom: 12px; 
            border-left: 4px solid #ccc; 
            border-radius: 4px;
            font-size: 14px;
        }
        .message.operator { border-left-color: #007bff; background: #f8f9fa; }
        .message.user { border-left-color: #28a745; background: #f8fff8; }
        .message.system { border-left-color: #ffc107; background: #fffbf0; }
        h1 { color: #333; text-align: center; margin-bottom: 30px; }
        h2 { color: #555; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .api-status {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 DAL Scooter - Two-Way Communication</h1>

        <div class="api-status" id="apiStatus">
            Checking API connection...
        </div>
        
        <!-- Operator Response Section -->
        <div class="section">
            <h2>📧 Operator Response (Sends Email to Customer)</h2>
            <form id="operatorForm">
                <div class="form-group">
                    <label>Concern ID:</label>
                    <input type="text" id="opConcernId" placeholder="C1753936029971" required>
                </div>
                <div class="form-group">
                    <label>Operator:</label>
                    <select id="operatorId" required>
                        <option value="74289488-40b1-70e9-a2a5-2c46aab86488">Unity Monk Digital</option>
                        <option value="44086448-f011-70dd-db8e-75e4cb8c8e85">Patel Ekta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Response Message:</label>
                    <textarea id="opMessage" rows="4" placeholder="Hi, we've received your concern..." required></textarea>
                </div>
                <button type="submit">📤 Send Response to Customer</button>
            </form>
            <div id="opStatus"></div>
        </div>

        <!-- Customer Follow-up Section -->
        <div class="section">
            <h2>💬 Customer Follow-up (Sends Email to Operator)</h2>
            <form id="customerForm">
                <div class="form-group">
                    <label>Concern ID:</label>
                    <input type="text" id="custConcernId" placeholder="C1753936029971" required>
                </div>
                <div class="form-group">
                    <label>Customer Message:</label>
                    <textarea id="custMessage" rows="4" placeholder="Thank you for your response..." required></textarea>
                </div>
                <button type="submit">💬 Send Follow-up Message</button>
            </form>
            <div id="custStatus"></div>
        </div>

        <!-- View Messages Section -->
        <div class="section">
            <h2>📋 View All Messages</h2>
            <div class="form-group">
                <label>Concern ID:</label>
                <input type="text" id="viewConcernId" placeholder="C1753936029971">
                <button onclick="loadMessages()" style="margin-top: 10px; width: auto; display: inline-block; padding: 8px 16px;">🔄 Load Messages</button>
            </div>
            <div id="messagesContainer" class="messages"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://llcrjx8j5c.execute-api.us-east-1.amazonaws.com';

        async function checkApiConnection() {
            const statusDiv = document.getElementById('apiStatus');
            try {
                const testId = 'C1753936029971';
                const response = await fetch(`${API_BASE}/concerns/${testId}/messages`);
                if (response.ok) {
                    statusDiv.innerHTML = '✅ API Connection: OK';
                    statusDiv.style.background = '#d4edda';
                    statusDiv.style.color = '#155724';
                } else {
                    throw new Error('API not responding correctly');
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ API Connection: Failed';
                statusDiv.style.background = '#f8d7da';
                statusDiv.style.color = '#721c24';
            }
        }

        async function sendMessage(concernId, payload, statusElementId) {
            const statusDiv = document.getElementById(statusElementId);
            statusDiv.innerHTML = '<div class="status">Sending message...</div>';
            try {
                const response = await fetch(`${API_BASE}/concerns/${concernId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (response.ok) {
                    statusDiv.innerHTML = `<div class="status success">✅ Message sent! Email forwarded.</div>`;
                    document.getElementById(payload.senderType === 'OPERATOR' ? 'opMessage' : 'custMessage').value = '';
                    const viewingConcern = document.getElementById('viewConcernId').value;
                    if (viewingConcern === concernId) setTimeout(() => loadMessages(), 1000);
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ Error: ${result.error || result.message}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Network error: ${error.message}</div>`;
            }
        }

        document.getElementById('operatorForm').addEventListener('submit', e => {
            e.preventDefault();
            sendMessage(
                document.getElementById('opConcernId').value,
                {
                    senderId: document.getElementById('operatorId').value,
                    senderType: 'OPERATOR',
                    operatorId: document.getElementById('operatorId').value,
                    message: document.getElementById('opMessage').value
                },
                'opStatus'
            );
        });

        document.getElementById('customerForm').addEventListener('submit', e => {
            e.preventDefault();
            sendMessage(
                document.getElementById('custConcernId').value,
                {
                    senderId: 'customer-user',
                    senderType: 'USER',
                    message: document.getElementById('custMessage').value
                },
                'custStatus'
            );
        });

        async function loadMessages() {
            const concernId = document.getElementById('viewConcernId').value;
            if (!concernId) return alert('Please enter a Concern ID');
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '<div style="text-align: center; padding: 20px;">Loading messages...</div>';
            try {
                const response = await fetch(`${API_BASE}/concerns/${concernId}/messages`);
                const result = await response.json();
                if (response.ok) {
                    if (result.messages?.length) {
                        container.innerHTML = result.messages.map(msg => `
                            <div class="message ${msg.senderType.toLowerCase()}">
                                <strong>${msg.senderType}: ${msg.senderId}</strong><br>
                                <small>${new Date(msg.timestamp).toLocaleString()}</small><br>
                                <div style="margin-top: 8px;">${msg.message}</div>
                            </div>
                        `).join('');
                        container.scrollTop = container.scrollHeight;
                    } else {
                        container.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">No messages found.</div>';
                    }
                } else {
                    container.innerHTML = `<div class="status error">Error loading messages: ${result.error}</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="status error">Network error: ${error.message}</div>`;
            }
        }

        function copyToAll(concernId) {
            document.getElementById('opConcernId').value = concernId;
            document.getElementById('custConcernId').value = concernId;
            document.getElementById('viewConcernId').value = concernId;
        }

        setInterval(() => {
            if (document.getElementById('viewConcernId').value) loadMessages();
        }, 5000);

        window.onload = function() {
            const testConcernId = 'C1753936029971';
            copyToAll(testConcernId);
            checkApiConnection();
        };
    </script>
</body>
</html>
